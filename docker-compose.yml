services:
  # 🔭 Starlink Exporter (extrae métricas de la antena)
  starlink-exporter:
    image: ghcr.io/joshuasing/starlink_exporter:latest
    container_name: starlink-exporter
    restart: unless-stopped
    command: ["-dish=192.168.100.1:9200", "-listen=:9451", "-location"]
    ports:
      - "9451:9451"
    networks:
      - starlink-net

  # 📊 Prometheus (almacena métricas)
  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    restart: unless-stopped
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/usr/share/prometheus/console_libraries'
      - '--web.console.templates=/usr/share/prometheus/consoles'
    depends_on:
      - starlink-exporter
    networks:
      - starlink-net

  # ⚙️ Backend (procesa métricas y sirve WebSockets)
  backend:
    build: backend
    image: ghcr.io/lipicero/starlink-dashboard-backend:latest
    container_name: starlink-backend
    restart: unless-stopped
    ports:
      - "4000:4000"
    environment:
      - PROMETHEUS_URL=http://prometheus:9090
      - POLL_INTERVAL_MS=1000
      - PORT=4000
      - MOCK_MODE=false
    volumes:
      - ./consumption.json:/app/consumption.json
    depends_on:
      - prometheus
    networks:
      - starlink-net

  # 🖥️ Frontend (Interfaz de Usuario)
  frontend:
    build: frontend
    image: ghcr.io/lipicero/starlink-dashboard-frontend:latest
    container_name: starlink-frontend
    restart: unless-stopped
    ports:
      - "3000:3000"
    depends_on:
      - backend
    networks:
      - starlink-net

  # 🤖 Watchtower (Actualiza automáticamente los contenedores cuando hay imágenes nuevas)
  watchtower:
    image: containrrr/watchtower
    container_name: watchtower
    restart: unless-stopped
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      - WATCHTOWER_CLEANUP=true
      - WATCHTOWER_POLL_INTERVAL=300 # Revisa cada 5 minutos
    networks:
      - starlink-net

networks:
  starlink-net:
    driver: bridge

volumes:
  prometheus_data:
