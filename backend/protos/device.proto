syntax = "proto3";

package SpaceX.API.Device;

import "common.proto";

service Device {
    rpc Handle(Request) returns (Response);
}

message Request {
    oneof request {
        GetStatusRequest get_status = 2006;
    }
}

message Response {
    oneof response {
         DishGetStatusResponse dish_get_status = 2006;
    }
}

message GetStatusRequest {}

message DishGetStatusResponse {
    DeviceInfo device_info = 1;
    DeviceState device_state = 2;
    
    DishState dish_state = 1000; // Assuming minimal fields mapping
    DishAlerts alerts = 1005;
    DishOutage outage = 1014;
    DishGpsStats gps_stats = 1015;
    DishReadyStates ready_states = 1030; // Motors, etc
    DishObstructionStats obstruction_stats = 1004;
    // Add other fields as discovered/needed
    
    float downlink_throughput_bps = 1007; 
    float uplink_throughput_bps = 1008;
    float pop_ping_latency_ms = 1009;
    float pop_ping_drop_rate = 1010;
    bool eth_link_active = 1011;
    bool is_snr_above_noise_floor = 1012;
}

message DishState {
     // Usually an enum or state 
}

message DishAlerts {
    bool motors_stuck = 1;
    bool thermal_throttle = 2;
    bool thermal_shutdown = 3;
    bool mast_not_near_vertical = 4;
    bool unexpected_location = 5;
    bool slow_ethernet_speeds = 6;
    bool roaming = 7;
}

message DishObstructionStats {
    float fraction_obstructed = 1;
    float valid_s = 2;
    bool currently_obstructed = 3;
    float avg_prolonged_obstruction_duration_s = 4;
    float avg_prolonged_obstruction_interval_s = 5;
    bool avg_prolonged_obstruction_valid = 6;
    float time_fully_obstructed_s = 7;
    float time_obscured_s = 8;
}

message DishOutage {
    enum Cause {
        UNKNOWN = 0;
        BOOTING = 1;
        STOWED = 2;
        THERMAL_SHUTDOWN = 3;
        NO_SCHEDULE = 4;
        NO_SATS = 5;
        OBSTRUCTED = 6;
        NO_DOWNLINK = 7;
        NO_PINGER = 8;
    }
    Cause cause = 1;
    int64 start_timestamp_ns = 2;
    uint64 duration_ns = 3;
    bool did_switch = 4;
}

message DishGpsStats {
    bool gps_valid = 1;
    uint32 sat_count = 2;
}

message DishReadyStates {
    bool cady = 1;
    bool scp = 2;
    bool l1l2 = 3;
    bool xphy = 4;
    bool aap = 5;
    bool rf = 6;
}
