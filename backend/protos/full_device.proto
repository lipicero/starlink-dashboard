syntax = "proto3";

package SpaceX.API.Device;

service Device {
    rpc Handle(Request) returns (Response);
    rpc Stream(stream Request) returns (stream Response);
}

message Request {
    uint64 id = 1;
    uint64 epoch_id = 2;
    uint64 target_id = 3;
    
    oneof request {
        GetStatusRequest get_status = 2006;
        GetHistoryRequest get_history = 2007;
        GetDeviceInfoRequest get_device_info = 2004;
    }
}

message Response {
    uint64 id = 1;
    Status status = 2;
    uint64 api_version = 3;
    
    oneof response {
         DishGetStatusResponse dish_get_status = 2006;
         DishGetHistoryResponse dish_get_history = 2007;
         GetDeviceInfoResponse get_device_info = 2004;
    }
}

message Status {
    int32 code = 1;
    string message = 2;
}

message GetStatusRequest {}
message GetHistoryRequest {}
message GetDeviceInfoRequest {}

message GetDeviceInfoResponse {
    DeviceInfo device_info = 1;
}

message DeviceInfo {
    string id = 1;
    string hardware_version = 2;
    string software_version = 3;
    string country_code = 4;
    int32 utc_offset_s = 5;
    bool software_partitions_equal = 6;
    bool is_dev = 7;
    int32 bootcount = 8;
    int32 anti_rollback_version = 9;
    bool is_hitl = 10;
    string manufactured_version = 11;
    int64 generation_number = 12;
    int64 dish_cohort_id = 13;
    bool is_bootrom_override = 14;
}

message DishGetStatusResponse {
    DeviceInfo device_info = 1;
    DeviceState device_state = 2;
    DishState dish_state = 1000; 
    DishAlerts alerts = 1005;
    DishOutage outage = 1014;
    DishGpsStats gps_stats = 1015;
    DishObstructionStats obstruction_stats = 1004;
    
    float downlink_throughput_bps = 1007; 
    float uplink_throughput_bps = 1008;
    float pop_ping_latency_ms = 1009;
    float pop_ping_drop_rate = 1010;
    bool eth_link_active = 1011;
    bool is_snr_above_noise_floor = 1012;
}

message DeviceState {
    uint64 uptime_s = 1;
}

message DishGetHistoryResponse {
    uint64 current = 1;
    repeated float pop_ping_latency_ms = 1001;
    repeated float downlink_throughput_bps = 1002;
    repeated float uplink_throughput_bps = 1003;
}

message DishAlerts {
    bool motors_stuck = 1;
    bool thermal_throttle = 2;
    bool thermal_shutdown = 3;
    bool mast_not_near_vertical = 4;
    bool unexpected_location = 5;
    bool slow_ethernet_speeds = 6;
    bool roaming = 7;
}

message DishObstructionStats {
    float fraction_obstructed = 1;
    float valid_s = 2;
    bool currently_obstructed = 3;
    float avg_prolonged_obstruction_duration_s = 4;
    float avg_prolonged_obstruction_interval_s = 5;
    bool avg_prolonged_obstruction_valid = 6;
    float time_fully_obstructed_s = 7;
    float time_obscured_s = 8;
}

message DishOutage {
    enum Cause {
        UNKNOWN = 0;
        BOOTING = 1;
        STOWED = 2;
        THERMAL_SHUTDOWN = 3;
        NO_SCHEDULE = 4;
        NO_SATS = 5;
        OBSTRUCTED = 6;
        NO_DOWNLINK = 7;
        NO_PINGER = 8;
    }
    Cause cause = 1;
    int64 start_timestamp_ns = 2;
    uint64 duration_ns = 3;
    bool did_switch = 4;
}

message DishGpsStats {
    bool gps_valid = 1;
    uint32 sat_count = 2;
}

enum DishState {
    UNKNOWN = 0;
    CONNECTED = 1;
    SEARCHING = 2;
    BOOTING = 3;
}
